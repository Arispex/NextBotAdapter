name: Build DLL

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore NextBotAdapter/NextBotAdapter.csproj

      - name: Build DLL
        run: dotnet build NextBotAdapter/NextBotAdapter.csproj --configuration Release --no-restore

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: NextBotAdapter
          path: NextBotAdapter/bin/Release/net9.0/NextBotAdapter.dll
          if-no-files-found: error
